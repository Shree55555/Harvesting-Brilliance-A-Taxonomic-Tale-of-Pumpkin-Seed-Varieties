<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict - Seed Classifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .form-label {
            font-weight: 600;
            color: #495057;
            font-size: 0.9rem;
        }
        .btn-submit {
            background-color: #2b580c;
            color: white;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #1e3e08;
            color: white;
        }
        .result-box {
            background-color: #e8f5e9;
            border-left: 5px solid #2b580c;
            padding: 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/" style="font-weight: 700; letter-spacing: 2px;">SEED AI</a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/predict">Predict</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row justify-content-center">
            
            {% if prediction_text %}
            <div class="col-lg-8 mb-4">
                <div class="result-box shadow-sm">
                    <h4 class="mb-2" style="color: #2b580c;">Analysis Complete</h4>
                    <p class="mb-0 fs-5"><strong>{{ prediction_text }}</strong></p>
                </div>
            </div>
            {% endif %}

            <div class="col-lg-8">
                <div class="card p-4 p-md-5">
                    <h3 class="mb-4 border-bottom pb-3">Enter Seed Morphological Details</h3>
                    
                    <form action="{{ url_for('predict')}}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Area</label>
                                <input type="text" name="Area" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Perimeter</label>
                                <input type="text" name="Perimeter" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Major Axis Length</label>
                                <input type="text" name="Major_Axis_Length" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Solidity (range: 0-1)</label>
                                <input type="text" name="Solidity" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Extent (range: 0-1)</label>
                                <input type="text" name="Extent" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Roundness (range: 0-1)</label>
                                <input type="text" name="Roundness" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Aspect Ratio (range: 0-3)</label>
                                <input type="text" name="Aspect_Ration" class="form-control bg-light" required="required">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Compactness (range: 0-1)</label>
                                <input type="text" name="Compactness" class="form-control bg-light" required="required">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-submit shadow-sm mt-2">Process Data</button>
                    </form>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
